global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "kun-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "kun-api"

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]

  - job_name: "nats"
    metrics_path: "/varz"
    static_configs:
      - targets: ["nats:8222"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
