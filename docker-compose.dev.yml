# KUN 开发基础设施 (ADR-006: 跑在 Docker Desktop Linux VM 里)
# 使用: docker compose -f docker-compose.dev.yml up -d
# 停用: docker compose -f docker-compose.dev.yml down
# 重置: docker compose -f docker-compose.dev.yml down -v

name: kun-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      com.kun.environment: "dev"
      com.kun.prod-isolated: "true"
    environment:
      POSTGRES_USER: kun
      POSTGRES_PASSWORD: kun
      POSTGRES_DB: kun
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kun"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "max_connections=200"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "16333:6333"    # HTTP (host:container; 6333 held by Genesis qdrant)
      - "16334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__ENABLE_TLS: "false"
      QDRANT__LOG_LEVEL: "INFO"

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"    # client
      - "8222:8222"    # http monitoring
    volumes:
      - nats_data:/data
    command:
      - "-js"                                 # enable JetStream (ADR-005)
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    labels:
      com.kun.environment: "dev"
      com.kun.prod-isolated: "true"
    ports:
      - "19000:9000"    # S3 API (9000 held by dreamapp-minio)
      - "19001:9001"    # console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    ports:
      - "14317:4317"    # OTLP gRPC
      - "14318:4318"    # OTLP HTTP
      - "18888:8888"    # metrics (8888 held by searxng)
    volumes:
      - ./kun/infra/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
      - prometheus

  # Tracing backend
  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686"   # UI
      - "14250:14250"   # collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # Metrics backend
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./kun/infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # Logs backend
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]

  # Visualization
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3011:3000"    # Grafana (3000 often taken by frontends)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./kun/infra/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
      - loki
      - jaeger

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  nats_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
